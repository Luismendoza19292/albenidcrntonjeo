<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Alguien Especial</title>
    <style>
        :root {
            --primary-color: #ff4b6b;
            --secondary-color: #ffeef0;
            --text-color: #4a4a4a;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fcebef 0%, #ffeef0 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 75, 107, 0.1);
            backdrop-filter: blur(10px);
            max-width: 600px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.5);
            z-index: 10;
            animation: fadeIn 2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .heart {
            color: var(--primary-color);
            font-size: 50px;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        h1 {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 20px;
            font-weight: 300;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: var(--text-color);
            margin-bottom: 30px;
        }

        .signature {
            font-style: italic;
            font-weight: bold;
            color: var(--primary-color);
            font-size: 1.4rem;
        }

        /* Partículas de fondo */
        .floating-hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background-color: var(--primary-color);
            opacity: 0.3;
            border-radius: 50%;
            animation: float 10s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="floating-hearts" id="hearts"></div>

    <div class="container">
        <div class="heart">❤</div>
        <h1>¡Hola!</h1>
        <p>Queremos decirte que <strong>te queremos mucho</strong> y siempre te vamos a querer, toda la vida.</p>
        <p class="signature">Soy tu vida entera.</p>
    </div>

    <script>
        function createHearts() {
            const container = document.getElementById('hearts');
            const heartCount = 20;

            for (let i = 0; i < heartCount; i++) {
                const heart = document.createElement('div');
                heart.className = 'particle';
                
                const size = Math.random() * 15 + 5 + 'px';
                heart.style.width = size;
                heart.style.height = size;
                
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = Math.random() * 5 + 5 + 's';
                heart.style.animationDelay = Math.random() * 5 + 's';
                
                container.appendChild(heart);
            }
        }
        createHearts();
    </script>
</body>
</html>
